<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JT Contractor App</title>
<style>
body { background:#111; color:#fff; font-family:Arial; margin:0; }
button { padding:10px; margin:5px; background:#d4a64a; border:none; border-radius:8px; font-weight:bold;}
.tab { display:none; padding:15px;}
.active { display:block;}
</style>
</head>

<body>

<h2 style="text-align:center;">JT Contractor App</h2>

<div style="text-align:center;">
<button onclick="openTab('dashboard')">Dashboard</button>
<button onclick="openTab('schedule')">Schedule</button>
<button onclick="openTab('receipts')">Receipts</button>
<button onclick="openTab('vehicles')">Vehicles</button>
</div>

<div id="dashboard" class="tab active">
<h3>Dashboard</h3>
<p>App is now working ✅</p>
</div>

<div id="schedule" class="tab">
<h3>Schedule</h3>
<input type="text" id="event" placeholder="Event">
<input type="date" id="date">
<button onclick="addEvent()">Add</button>
<ul id="list"></ul>
</div>

<div id="receipts" class="tab">
<h3>Receipts</h3>
<input type="number" id="cost" placeholder="Cost">
<button onclick="addCost()">Add</button>
<p>Total: $<span id="total">0</span></p>
</div>

<div id="vehicles" class="tab">
<h3>KM Tracker</h3>
<input type="number" id="start" placeholder="Start KM">
<input type="number" id="end" placeholder="End KM">
<button onclick="addKm()">Add</button>
<p>Total KM: <span id="km">0</span></p>
</div>

<script>
let total=0, km=0;

function openTab(tab){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(tab).classList.add('active');
}

function addEvent(){
 let e=document.getElementById('event').value;
 let d=document.getElementById('date').value;
 let li=document.createElement('li');
 li.innerText=e+" - "+d;
 document.getElementById('list').appendChild(li);
}

function addCost(){
 let c=parseFloat(document.getElementById('cost').value)||0;
 total+=c;
 document.getElementById('total').innerText=total;
}

function addKm(){
 let s=parseFloat(start.value)||0;
 let e=parseFloat(end.value)||0;
 km+=e-s;
 document.getElementById('km').innerText=km;
}
</script>

</body>
</html>
